<!DOCTYPE html>
<html>

<head>

<title>Adaptive CAPTCHA</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

</head>

<body>

<div class="captcha-container">

<h2>Adaptive CAPTCHA</h2>

<p>Select all images with <b>Traffic Lights</b></p>

<div class="grid">

{% for tile in tiles %}
<img src="{{ url_for('static', filename='tiles/' + tile) }}">
{% endfor %}

</div>

<hr>

<h5>⚠️ Risk Score: {{ risk_score }}</h5>

<h5>
Risk Level:
<span class="
{% if risk_level == 'Low' %}
text-success
{% elif risk_level == 'Medium' %}
text-warning
{% else %}
text-danger
{% endif %}
">
{{ risk_level }}
</span>
</h5>

<h5>🤖 Bot Probability: {{ bot_probability }}%</h5>

<div class="progress mt-2" style="height:20px;">

<div class="progress-bar
{% if bot_probability < 30 %}
bg-success
{% elif bot_probability < 70 %}
bg-warning
{% else %}
bg-danger
{% endif %}
"
role="progressbar"
style="width: {{ bot_probability }}%;">
</div>

</div>

</div>

</body>
</html>
