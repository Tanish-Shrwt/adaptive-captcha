<!DOCTYPE html>
<html>
<head>

<title>Adaptive CAPTCHA Security</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

</head>

<body>

<div class="captcha-container mt-5">

<div class="card p-4 shadow">

<h3 class="text-center mb-4">🔐 Adaptive CAPTCHA</h3>

<form method="POST" id="captchaForm">

<div class="text-center mb-3">

<img src="{{ url_for('static', filename='captcha_images/captcha.png') }}" width="220">

</div>

<input type="text"
       name="captcha_input"
       id="captchaInput"
       class="form-control mb-3"
       placeholder="Enter CAPTCHA"
       required>

<button type="submit" class="btn btn-primary w-100">
Verify CAPTCHA
</button>

</form>

{% if message %}
<div class="alert alert-info mt-3 text-center">
{{ message }}
</div>
{% endif %}

<hr>

<h5 class="mt-3">⚠️ Risk Score: {{ risk_score }}</h5>

<h5>
Risk Level:
<span class="
{% if risk_level == 'Low' %}
text-success
{% elif risk_level == 'Medium' %}
text-warning
{% else %}
text-danger
{% endif %}
">
{{ risk_level }}
</span>
</h5>

<h5>🤖 Bot Probability: {{ bot_probability }}%</h5>

<div class="progress mt-2" style="height:20px;">

<div class="progress-bar
{% if bot_probability < 30 %}
bg-success
{% elif bot_probability < 70 %}
bg-warning
{% else %}
bg-danger
{% endif %}
"
role="progressbar"
style="width: {{ bot_probability }}%;">
</div>

</div>

</div>

</div>

<script src="{{ url_for('static', filename='js/behavior.js') }}"></script>

</body>
</html>
