<!DOCTYPE html>
<html>
<head>

<title>Adaptive CAPTCHA Security</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

</head>

<body>

<div class="captcha-container mt-5">

<div class="card p-4 shadow">

<h3 class="text-center mb-4 fw-bold">
    <i class="bi bi-shield-lock-fill text-primary"></i> Adaptive CAPTCHA
</h3>

<form method="POST" id="captchaForm">

<div class="text-center mb-3">

<img src="{{ url_for('static', filename='captcha_images/captcha.png') }}" width="220">

</div>

<input type="text"
       name="captcha_input"
       id="captchaInput"
       class="form-control mb-3"
       placeholder="Enter CAPTCHA"
       required>

<button type="submit" class="btn btn-primary w-100">
Verify CAPTCHA
</button>

</form>

{% if message %}
<div class="alert alert-info mt-3 text-center">
{{ message }}
</div>
{% endif %}

<hr>

<hr class="my-4">

<div class="row text-center">

    <div class="col-4">
        <div class="stat-box">
            <i class="bi bi-speedometer2 text-warning"></i>
            <h6>Risk Score</h6>
            <h4>{{ risk_score }}</h4>
        </div>
    </div>

    <div class="col-4">
        <div class="stat-box">
            <i class="bi bi-shield-exclamation text-danger"></i>
            <h6>Risk Level</h6>
            <h4 class="
                {% if risk_level == 'Low' %}
                text-success
                {% elif risk_level == 'Medium' %}
                text-warning
                {% else %}
                text-danger
                {% endif %}
            ">
                {{ risk_level }}
            </h4>
        </div>
    </div>

    <div class="col-4">
        <div class="stat-box">
            <i class="bi bi-robot text-primary"></i>
            <h6>Bot %</h6>
            <h4>{{ bot_probability }}%</h4>
        </div>
    </div>

</div>
<div class="row text-center mt-3">

    <div class="col-6">
        <div class="stat-box small-box">
            <i class="bi bi-mouse"></i>
            <h6>Mouse Activity</h6>
            <p id="mouseActivity">{{ mouse_moves if mouse_moves else 0 }} moves</p>
        </div>
    </div>

    <div class="col-6">
        <div class="stat-box small-box">
            <i class="bi bi-clock-history"></i>
            <h6>Response Time</h6>
            <p id="responseTime">{{ time_spent if time_spent else 0 }} ms</p>
        </div>
    </div>

</div>
<div class="progress mt-2" style="height:20px;">

<div class="progress-bar
{% if bot_probability < 30 %}
bg-success
{% elif bot_probability < 70 %}
bg-warning
{% else %}
bg-danger
{% endif %}
"
role="progressbar"
style="width: {{ bot_probability | float }}%;">
</div>

</div>

</div>

</div>

<script src="{{ url_for('static', filename='js/behavior.js') }}"></script>

</body>
</html>
